<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="description" content="4Drivers — controle de manutenções, abastecimentos e gastos com veículos.">
  <title>4Drivers</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="4Drivers">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar (desktop) -->
    <nav id="sidebar" aria-label="Navegação principal">
      <div class="sidebar-brand">
        <img src="icons/icon.svg" alt="" width="34" height="34">
        <span>4Drivers</span>
      </div>
      <div class="sidebar-links" id="sidebar-links"></div>
      <div class="sidebar-footer">
        <button class="btn-add-main" id="btn-add-desktop">＋ Novo registro</button>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main">
      <header id="topbar">
        <h1 id="page-title">Início</h1>
        <div class="topbar-actions">
          <select id="vehicle-filter" class="vehicle-filter" aria-label="Filtrar por veículo"></select>
          <button id="btn-notifications" class="icon-btn" title="Alertas" aria-label="Alertas">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            <span id="alert-badge" class="badge" hidden></span>
          </button>
        </div>
      </header>
      <div id="view" tabindex="-1"></div>
    </main>

    <!-- Tab bar (mobile) -->
    <nav id="tabbar" aria-label="Navegação principal"></nav>

    <!-- FAB (mobile) -->
    <button id="fab" aria-label="Novo registro">＋</button>
  </div>

  <!-- Modal sheet -->
  <div id="modal-backdrop" hidden>
    <div id="modal" role="dialog" aria-modal="true">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-cancel" id="modal-cancel">Cancelar</button>
        <h2 id="modal-title"></h2>
        <button class="modal-save" id="modal-save">Salvar</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
